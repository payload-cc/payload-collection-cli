[tasks.init]
description = "Initialize a dummy Payload application for E2E testing"
run = """
#!/usr/bin/env bash
set -e
rm -rf _payload payload
npx -y create-payload-app@latest -n _payload -t blank --db sqlite --no-deps --db-accept-recommended
# Fallback rename just in case it creates 'payload' instead of '_payload'
if [ -d "payload" ]; then mv payload _payload; fi
cd _payload
mkdir -p src/collections
cp ../payload-template/Posts.ts src/collections/Posts.ts
cp ../payload-template/Categories.ts src/collections/Categories.ts
cp ../payload-template/constants.ts src/constants.ts
cp ../payload-template/payload.config.ts src/payload.config.ts
pnpm install
"""

[tasks.test]
description = "Run all E2E test scenarios within the _payload app context"
depends = ["init"]
run = """
#!/usr/bin/env bash
set -e
echo "Building the CLI before test..."
pnpm --dir ../ build
echo "Running E2E tests via vitest..."
pnpm --dir ../ test:e2e
"""
